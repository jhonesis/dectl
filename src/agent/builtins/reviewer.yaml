name: reviewer
role: "Quality gate: build + test + lint + spec compliance verification"
description: >
  Review phase: compile, run tests, check linting, verify git changes,
  validate against project conventions, and verify the implementation
  matches the spec requirements (task_id → REQ-XXX → acceptance criteria).
  Third step in the SDD pipeline. Run after implementing.
  Note: Agents are fault-tolerant. Reviewer runs even if coder fails
  (but will report compilation errors).
requires:
  - coder
context_files:
  - ".dec/config/project.toml"
next_step_hint: "If all checks pass: dectl agent run documenter --task {{task}} --var task_id={{task_id}}"
steps:
  - type: action
    description: Look up task in SDD specs
    shell: true
    cmd: ["found=$(grep -rn -B2 -A5 '{{task_id}}' specs/*/tasks.md 2>/dev/null | head -20); if [ -z \"$found\" ]; then echo 'TASK_NOT_FOUND_IN_SPECS'; else echo \"$found\"; req=$(echo \"$found\" | grep -oE 'REQ-[A-Z0-9-]+' | head -1); if [ -n \"$req\" ]; then echo '---'; echo \"REQ=$req\"; echo '---'; grep -A5 \"$req\" specs/*/spec.md 2>/dev/null | head -20; fi; fi"]

  - type: action
    description: Build project
    shell: true
    cmd: ["cmd=$(grep -A1 '\\[build\\]' .dec/config/project.toml 2>/dev/null | grep 'command' | cut -d'\"' -f2); if [ -n \"$cmd\" ]; then eval \"$cmd\" 2>&1; else echo 'NO_BUILD_COMMAND'; fi"]

  - type: action
    description: Run test suite
    shell: true
    cmd: ["cmd=$(grep -A1 '\\[test\\]' .dec/config/project.toml 2>/dev/null | grep 'command' | cut -d'\"' -f2); if [ -n \"$cmd\" ]; then eval \"$cmd\" 2>&1; elif [ -f Cargo.toml ]; then cargo test 2>&1; elif [ -f package.json ]; then npm test 2>&1; else echo 'NO_TEST_COMMAND'; fi"]

  - type: action
    description: Run linter
    shell: true
    cmd: ["cmd=$(grep -A1 '\\[lint\\]' .dec/config/project.toml 2>/dev/null | grep 'command' | cut -d'\"' -f2); if [ -n \"$cmd\" ]; then eval \"$cmd\" 2>&1; elif [ -f Cargo.toml ]; then cargo clippy 2>&1; elif [ -f package.json ]; then npx eslint . 2>&1; else echo 'NO_LINT_COMMAND'; fi"]

  - type: action
    description: Show detailed changes
    cmd: ["git", "diff", "--stat", "--no-color"]

  - type: action
    description: Show full diff for review
    shell: true
    cmd: ["git diff --no-color | head -500"]

  - type: action
    description: Count changes
    shell: true
    cmd: ["git diff --shortstat 2>/dev/null || echo 'No changes'"]

  - type: action
    description: Check untracked files
    shell: true
    cmd: ["git ls-files --others --exclude-standard | head -20 || echo 'No untracked files'"]

  - type: write
    description: Save review report
    path: ".dec/agent-output/{{task_id}}-review.md"
    content: |
      # Review Report: {{task}}
      ## Task ID: {{task_id}}

      ### Spec Compliance
      {{step_1_output}}

      ### Build
      {{step_2_output}}

      ### Tests
      {{step_3_output}}

      ### Lint
      {{step_4_output}}

      ### Change Summary
      {{step_5_output}}

      ### Change Stats
      {{step_7_output}}

      ### Untracked Files
      {{step_8_output}}

  - type: action
    description: Record review in memory
    cmd: ["dectl", "memory", "add", "Review {{task_id}}: spec+build+test+lint completed", "--tags", "review,{{task_id}},spec-verify"]

  - type: prompt
    description: Review analysis with spec verification
    content: |
      ## Review: {{task}}
      **Task ID**: {{task_id}}

      ### Spec Compliance Check
      The task was looked up in the SDD specs:
      ```
      {{step_1_output}}
      ```

      If a REQ-XXX was found, the implementation MUST satisfy the acceptance criteria above.
      If the task was NOT found in any spec, check if this is an ad-hoc task or if the spec needs updating.

      ### Automated Check Results
      See full report: `.dec/agent-output/{{task_id}}-review.md`

      ### Build Result
      {{step_2_output}}

      ### Test Result
      {{step_3_output}}

      ### Lint Result
      {{step_4_output}}

      ### Your review tasks:
      1. **Spec compliance**: Does the diff below implement the acceptance criteria from the spec? Check each criterion explicitly.
      2. **Logic**: Edge cases, error handling, input validation.
      3. **Conventions**: Check `.dec/config/project.toml` and project code style.
      4. **Security**: Injection, secrets, auth gaps.
      5. **Untracked files**: Should any be committed?

      ### Diff (first 500 lines):
      ```
      {{step_6_output}}
      ```

      ### Verdict:
      - PASS (spec compliant): `dectl agent run documenter --task "{{task}}" --var task_id={{task_id}}`
      - PASS (ad-hoc, no spec): `dectl agent run documenter --task "{{task}}" --var task_id={{task_id}}`
      - FAIL: Fix issues and re-run: `dectl agent run reviewer --task "{{task}}" --var task_id={{task_id}}`
