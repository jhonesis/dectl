name: reviewer
role: "Code quality reviewer"
description: "Review phase: build project, run tests, verify implementation quality. Third step in the SDD task pipeline. Run after implementing."
next_step_hint: "If satisfied, run: dectl agent run documenter --task {{task}} --var task_id={{task_id}}"
steps:
  - type: action
    description: Compile Code
    shell: true
    cmd: ["cmd=$(grep -A1 '\\[build\\]' .dec/config/project.toml 2>/dev/null | grep 'command' | cut -d'\"' -f2); if [ -n \"$cmd\" ]; then echo '━━━ Build ━━━' && eval \"$cmd\" && echo '✅ Build OK' || echo '❌ Build FAILED'; elif [ -f Makefile ] && grep -q '^build:' Makefile; then make build; else echo 'No build command in project.toml [build]'; exit 1; fi"]


  - type: action
    description: Show changes
    cmd: ["git", "diff", "--stat"]

  - type: write
    description: Save review report
    path: ".dec/agent-output/{{task_id}}-review.json"
    content: |
      {"build":"{{step_1_output}}","diff":"{{step_2_output}}"}

  - type: prompt
    description: Review report
    content: |
      ## Review: {{task}}

      ### Build
      {{step_1_output}}

      ### Changes
      {{step_2_output}}

      If build passed, run: dectl agent run documenter --task "{{task}}" --var task_id={{task_id}}
      If build failed, fix errors and re-run the reviewer.
