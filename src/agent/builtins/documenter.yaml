name: documenter
role: "Technical documentation generator"
description: "Documentation phase: register task decision in memory, update progress files, close the task cycle. Final step in the SDD task pipeline. Run after reviewer (even on failure)."
next_step_hint: "Task cycle complete. Log it: dectl memory add 'Task {{task_id}} completed: {{task}}' --tags task,sdd"
steps:
  - type: action
    description: Save implementation to memory
    cmd: ["dectl", "memory", "add", "Implemented: {{task}}", "--tags", "implementation"]

  - type: prompt
    description: Documentation instructions
    content: |
      ## Documentation: {{task}}

      ✅ Saved to memory

      ### Manual steps
      1. Edit `.dec/state/progress.json`
      2. Edit `.dec/state/last_session.md`
