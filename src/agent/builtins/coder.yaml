name: coder
role: "Feature implementer following project conventions"
description: Implements code respecting the stack and conventions from .dec/
steps:
  - type: action
    description: Search memory for context
    cmd: ["dectl", "memory", "search", "--json", "{{task}}"]

  - type: write
    description: Save memory context for implementation
    path: ".dec/agent-output/{{task_id}}-coder-memory.json"
    content: "{{step_1_output}}"

  - type: prompt
    description: Implementation brief
    content: |
      ## Code: {{task}}

      Context saved to `.dec/agent-output/{{task_id}}-coder-memory.json`

      Use your editing tools to implement the task.
      When done, run: dectl agent run reviewer --task "{{task}}" --var task_id={{task_id}}
