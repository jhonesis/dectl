# dectl project configuration
# This file defines the project for the model and tools.
# The model should read it at the start of every session.

[dec]
schema_version = "1.0"

[project]
name = "project-name"
# Project type: api | cli | microservice | monolith | library | other
type = "other"
description = "Brief project description in one sentence."

[stack]
# List of main project technologies
languages = []
frameworks = []
databases = []
tools = []

[conventions]
# Special conventions the model must follow for this project.
rules = []

[build]
# Command to build the project. Used by reviewer agent for verification.
# Example: "cargo build --release"
command = ""

[test]
# Command to run tests. Optional. Used by reviewer agent to validate changes.
# Example: "cargo test" or "npm test"
command = ""

[lint]
# Command to run linter. Optional. Used by reviewer agent for code quality checks.
# Example: "cargo clippy" or "npx eslint ."
command = ""
