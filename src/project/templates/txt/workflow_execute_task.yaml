name: execute_task
description: "Full SDD task execution pipeline: research -> code context -> implement -> review -> document -> close"
inputs:
  - name: task_id
    description: "Task identifier (e.g. T001)"
    required: true
  - name: description
    description: "Task description"
    required: true
steps:
  - type: agent
    description: "Investigate context and relevant memory for the task"
    agent_type: researcher
    task: "{{description}}"

  - type: agent
    description: "Prepare context for implementation"
    agent_type: coder
    task: "{{description}}"

  - type: prompt
    description: "AI model implements the changes"
    content: |
      Task {{task_id}}: {{description}}

      You (the AI model) must now implement this task using your editing tools.
      Read the context prepared by the coder agent in `.dec/agent-output/{{task_id}}-coder-context.md`
      and implement the changes following the project conventions.

      When implementation is complete, run:
        dectl workflow run execute_task --var task_id={{task_id}} --var description="{{description}}" --from-step 4

  - type: agent
    description: "Build + diff + verification"
    agent_type: reviewer
    task: "{{description}}"

  - type: agent
    description: "Register decision and close the task cycle"
    agent_type: documenter
    task: "{{description}}"
    run_always: true
