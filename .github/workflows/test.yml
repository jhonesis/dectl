name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}
          cache-on-failure: true

      # Note: Formatting check disabled - use `cargo fmt` locally before committing
      # - name: Check formatting
      #    run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --all

      - name: Binary size check
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            SIZE=$(stat -c%s target/release/dectl.exe 2>/dev/null || stat -f%z target/release/dectl.exe)
          elif [ "$(uname)" = "Darwin" ]; then
            SIZE=$(stat -f%z target/release/dectl)
          else
            SIZE=$(stat -c%s target/release/dectl)
          fi
          echo "Binary size: $SIZE bytes"
          if [ $SIZE -gt 20971520 ]; then
            echo "ERROR: Binary exceeds 20MB limit"
            exit 1
          fi
          echo "Binary size OK (under 20MB)"

  binary:
    name: Release Binary (${{ matrix.os }})
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact: dectl-ubuntu
          - os: macos-latest
            artifact: dectl-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Build Release
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/release/dectl
            target/release/dectl.exe
          if-no-files-found: error